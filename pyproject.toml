[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "scitex-gen"
version = "0.1.7"
description = "General utilities (caching, env detection, normalization, mat→npy, xml→dict, TimeStamper, …) — standalone module from the SciTeX ecosystem"
readme = "README.md"
license = "AGPL-3.0-only"
requires-python = ">=3.9"
authors = [{name = "Yusuke Watanabe", email = "ywatanabe@scitex.ai"}]
keywords = ["scitex", "general", "utilities"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering",
]
dependencies = [
    "numpy",
    "pandas",
    "scipy",
    "h5py",
    "matplotlib",
    "readchar",
    "torch",
    "scitex-context>=0.1.0",
    "scitex-decorators>=0.1.1",
    "scitex-dict>=0.1.0",
    "scitex-introspect>=0.1.1",
    "scitex-os>=0.1.0",
    "scitex-session>=0.1.0",
    "scitex-sh>=0.1.0",
    "scitex-stats>=0.1.0",
    "scitex-str>=0.1.2",
]

[project.optional-dependencies]
torch = [
    "torch",
    "xarray",
]
dev = [
    "joblib",
    "xarray",
    "pytest",
    "pytest-cov",
    "ruff",
]
docs = [
    "sphinx>=7.0",
    "sphinx-rtd-theme>=2.0",
    "myst-parser>=2.0",
    "sphinx-copybutton>=0.5",
    "sphinx-autodoc-typehints>=1.25",
]
all = [
    "scitex-gen[torch]",
]

[project.urls]
Homepage = "https://github.com/ywatanabe1989/scitex-gen"
Repository = "https://github.com/ywatanabe1989/scitex-gen"
Documentation = "https://scitex-gen.readthedocs.io"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
scitex_gen = ["_skills/**/*.md"]

[project.entry-points."scitex_dev.skills"]
scitex-gen = "scitex_gen"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = ["--disable-warnings"]

[tool.ruff]
target-version = "py39"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I"]
ignore = ["E501"]

[tool.scitex-linter]
library_dirs = ["src", "tests", "examples", "apps", "config", "docs"]
